# .github/workflows/final-probe.yml
name: "Layer 2: Final URL Probe"
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install
      - run: bun scripts/final-probe.js 2>&1 | tee /tmp/final-probe-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-patches
          path: /tmp/final-patches.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-probe-report
          path: /tmp/final-probe-report.txt
