name: "Layer 2: Setup Vectorize & Ingest Docs"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch + chunk but skip embedding/upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      cert_filter:
        description: "Only ingest specific cert (leave blank for all 9)"
        required: false
        default: ""
        type: string
      force_reingest:
        description: "Force re-ingest all URLs (ignores already-ingested check)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  ingest:
    name: Scrape, Embed & Upload to Vectorize
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify Cloudflare credentials
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Verifying Cloudflare API token..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: CF_API_TOKEN is invalid or expired (HTTP $RESPONSE)"
            exit 1
          fi
          echo "✓ CF_API_TOKEN is valid"

      - name: Create Vectorize index (if not exists)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Checking if Vectorize index exists..."
          INDEX_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/vectorize/v2/indexes/splunk-docs-index")
          
          # grep -E handles both "success":true and "success": true (with or without space)
          if echo "$INDEX_RESPONSE" | grep -E -q '"success":\s*true'; then
            echo "✓ Vectorize index already exists — skipping creation"
          else
            echo "Index not found — creating splunk-docs-index..."
            CREATE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"name":"splunk-docs-index","config":{"dimensions":384,"metric":"cosine"}}' \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/vectorize/v2/indexes")
            
            if echo "$CREATE_RESPONSE" | grep -E -q '"success":\s*true'; then
              echo "✓ Vectorize index created successfully"
              echo "Waiting 10s for index to become available..."
              sleep 10
            elif echo "$CREATE_RESPONSE" | grep -q 'duplicate_name'; then
              echo "✓ Index already exists (duplicate_name) — skipping creation"
            else
              echo "ERROR: Failed to create Vectorize index"
              echo "Response: $CREATE_RESPONSE"
              echo ""
              echo "Make sure your CF_API_TOKEN has 'Vectorize: Edit' permission."
              exit 1
            fi
          fi

      - name: Run ingestion script
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
          CERT_FILTER: ${{ inputs.cert_filter }}
          FORCE_REINGEST: ${{ inputs.force_reingest }}
        run: |
          echo "Starting ingestion..."
          echo "Dry run: $DRY_RUN"
          echo "Cert filter: ${CERT_FILTER:-'all certs'}"
          bun scripts/ingest.js

      - name: Verify ingestion results
        if: inputs.dry_run == 'false'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Checking Vectorize index stats..."
          curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/vectorize/v2/indexes/splunk-docs-index" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if data.get('success'):
              idx = data['result']
              print(f'Index name:      {idx.get(\"name\")}')
              print(f'Dimensions:      {idx.get(\"config\", {}).get(\"dimensions\")}')
              print(f'Metric:          {idx.get(\"config\", {}).get(\"metric\")}')
              print('✓ Vectorize index is healthy')
          else:
              print('WARNING: Could not retrieve index stats')
              print(json.dumps(data, indent=2))
          "

      - name: Summary
        if: always()
        run: |
          echo "=== Layer 2 Setup Summary ==="
          echo "Vectorize index: splunk-docs-index"
          echo "Embedding model: @cf/baai/bge-small-en-v1.5 (384 dimensions)"
          echo ""
          echo "Next steps:"
          echo "1. Add Vectorize binding to Cloudflare Worker (if not already done):"
          echo "   Dashboard → splunkmockexam → Settings → Bindings → Add Vectorize"
          echo "   Variable: VECTORIZE | Index: splunk-docs-index"
          echo "2. Add Workers AI binding:"
          echo "   Dashboard → splunkmockexam → Settings → Bindings → Add Workers AI"  
          echo "   Variable: AI"
          echo "3. Push wrangler.toml changes to trigger redeploy"
          echo ""
          echo "Layer 2 RAG is now active. Questions will be grounded in Splunk docs."
